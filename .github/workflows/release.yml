name: Publish Windows release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  release-build:
    name: Build Windows x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Verify tag matches package version
        shell: pwsh
        run: |
          $package = (cargo metadata --locked --no-deps --format-version 1 | ConvertFrom-Json).packages |
            Where-Object name -eq 'shitu' |
            Select-Object -First 1
          if ($null -eq $package) {
            throw 'Cargo workspace package shitu was not found.'
          }
          $expectedTag = "v$($package.version)"
          if ($env:GITHUB_REF_NAME -ne $expectedTag) {
            throw "Release tag $env:GITHUB_REF_NAME must match Cargo.toml version $expectedTag"
          }

      - name: Test
        run: cargo test --workspace --locked

      - name: Build release binary
        run: cargo build --release --locked --package shitu --bin ShiTu

      - name: Build Microsoft Store upload asset
        shell: pwsh
        run: |
          $package = (cargo metadata --locked --no-deps --format-version 1 | ConvertFrom-Json).packages |
            Where-Object name -eq 'shitu' |
            Select-Object -First 1
          if ($null -eq $package) {
            throw 'Cargo workspace package shitu was not found.'
          }
          .\tools\package-store-msix.ps1 `
            -ExecutablePath .\target\release\ShiTu.exe `
            -Version $package.version `
            -OutputDirectory .\release-assets

      - name: Package release assets
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $executable = 'target\release\ShiTu.exe'
          if (-not (Test-Path -LiteralPath $executable -PathType Leaf)) {
            throw "Expected release executable was not produced: $executable"
          }

          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          $archiveName = "ShiTu-$env:GITHUB_REF_NAME-windows-x86_64.zip"
          $archivePath = Join-Path 'release-assets' $archiveName
          Compress-Archive -LiteralPath $executable -DestinationPath $archivePath -Force

          $hash = (Get-FileHash -LiteralPath $archivePath -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash *$archiveName" | Set-Content -LiteralPath "$archivePath.sha256" -Encoding ascii -NoNewline

      - uses: actions/upload-artifact@v4
        with:
          name: shitu-windows-x86_64
          path: release-assets/*
          if-no-files-found: error

  github-release:
    name: Publish GitHub Release
    needs: release-build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          prerelease: false
          generate_release_notes: true
          files: release-assets/*
          fail_on_unmatched_files: true
